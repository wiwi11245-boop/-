<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>左轉事件場景 - 下半段（成功左轉完美節奏版）</title>
    <style>
        /* 1. 遊戲視窗容器 (保留左轉場景背景圖) */
        .game-viewport {
            width: 1000px;
            height: 400px;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
            border: 6px solid #4c8537;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            
            background-image: url('左轉場景.png'); 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* 2. 獨立太陽定位 */
        .static-sun {
            position: absolute;
            top: -62px;      
            left: 98px;      
            width: 172px;    
            height: auto;
            z-index: 1.5;   
            pointer-events: none;
        }

        /* 3. 靜態花朵物件 */
        .scenery-flower {
            position: absolute;
            width: 130px;    
            height: auto;
            z-index: 1.5;   
            pointer-events: none;
        }
        .flower-left { left: 30px; bottom: -50px; }
        .flower-middle { left: 380px; bottom: -50px; }
        .flower-right { right: 130px; bottom: -50px; }

        /* ==========================================
           4. 紅色主角車定位與成功左轉動畫
           ========================================== */
        /* 側身紅車 (Side view) */
        .player-car {
            position: absolute;
            width: 160px;       
            height: auto;       
            bottom: -5px;       
            
            /* ⚡ 同步調整：總時間與右轉一致，縮短為 5 秒 */
            animation: redCarSuccess 5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 2; 
        }

        /* 後視紅車 (Back view) */
        .player-car-back {
            position: absolute;
            width: 120px;       
            height: auto;       
            bottom: 10px;       
            left: 650px;
            opacity: 0;         
            
            /* ⚡ 同步調整：總時間與右轉一致，縮短為 5 秒 */
            animation: redCarBackSuccess 5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 1.8;       
        }

        /* 5. 藍色直行車定位與動畫 */
        .blue-car {
            position: absolute;
            width: 160px;
            height: auto;
            bottom: 15px;       
            
            /* ⚡ 同步調整：總時間與右轉一致，縮短為 5 秒 */
            animation: blueCarSuccess 5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 2;
        }

        /* ==========================================
           6. 側身紅車動畫時間軸 (套用右轉緊湊節奏)
           ========================================== */
        @keyframes redCarSuccess {
            0% { 
                left: 315px; 
                transform: translateY(0px); 
                opacity: 1; 
            }
            
            /* 0% ~ 20% (0s - 1.0s)：快速行駛至左轉轉角位置 */
            20% { 
                left: 810px; 
                transform: translateY(0px); 
                opacity: 1; 
            }
            
            /* 20% ~ 22% (1.0s - 1.1s)：【壓縮】極短的原地怠速抖動 */
            21% { left: 810px; transform: translateY(-5px); opacity: 1; }
            22% { left: 810px; transform: translateY(0px); opacity: 1; }
            
            /* 22.1% ~ 100%：瞬間隱形，將畫面交接給後視車 */
            22.1%, 100% {
                left: 810px;
                opacity: 0;
            }
        }

        /* ==========================================
           7. 後視紅車（CAR_BACK）左轉深入背景時間軸 (套用右轉緊湊節奏)
           ========================================== */
        @keyframes redCarBackSuccess {
            /* 0% ~ 22.1%：前段紅車為側身，後視圖層完全隱形 */
            0%, 22.1% {
                left: 850px;    
                bottom: 20px;
                opacity: 0;
                transform: scale(0.9);
            }
            
            /* 23% (1.15s 瞬間)：在左轉路口中心無縫接力顯現 */
            23% {
                left: 850px;    
                bottom: 20px;
                opacity: 1;
                transform: scale(0.9);
            }
            
            /* 23% ~ 100%：朝著左轉道路深處悠然前進，一邊縮小一邊淡出 */
            100% {
                left: 980px;    /* 保留左轉特定的遠端終點位置 */
                bottom: 250px;  
                opacity: 0.1;   
                transform: scale(0.35); 
            }
        }

        /* ==========================================
           8. 藍車直行穿過路口直至右側消失時間軸 (套用右轉緊湊節奏)
           ========================================== */
        @keyframes blueCarSuccess {
            0% { 
                left: 150px; 
                transform: translateY(0px); 
            }
            
            /* 0% ~ 20% (0s - 1.0s)：同步前進至轉角後方定點 */
            20% { 
                left: 540px; 
                transform: translateY(0px); 
            }
            
            /* 20% ~ 30% (1.0s - 1.5s)：【縮短停滯】原地進行緊湊的怠速抖動等待 */
            21% { left: 540px; transform: translateY(-3px); }
            23% { left: 540px; transform: translateY(0px); }
            25% { left: 540px; transform: translateY(-3px); }
            27% { left: 540px; transform: translateY(0px); }
            29% { left: 540px; transform: translateY(-3px); }
            30% { 
                left: 540px; 
                transform: translateY(0px); 
            }
            
            /* 30% ~ 100% (1.5s - 5.0s)：隨後起步，迅速衝出右側畫面消失 */
            100% {
                left: 1100px;   
                transform: translateY(0px);
            }
        }
    </style>
</head>
<body>

    <div class="game-viewport">
        <!-- 獨立靜態太陽 -->
        <img src="sun.gif" class="static-sun" alt="原地太陽">

        <!-- 靜態裝飾向日葵花叢 -->
        <img src="FLOWER.gif" class="scenery-flower flower-left" alt="裝飾花朵">
        <img src="FLOWER.gif" class="scenery-flower flower-middle" alt="裝飾花朵">
        <img src="FLOWER.gif" class="scenery-flower flower-right" alt="裝飾花朵">

        <!-- 紅色主角車 - 側身 (z-index: 2) -->
        <img src="CAR.gif" class="player-car" alt="紅車主角側身">

        <!-- 紅色主角車 - 後視 (z-index: 1.8，左轉時登場素材為 CAR_BACK.gif) -->
        <img src="CAR_BACK.gif" class="player-car-back" alt="紅車主角後視">

        <!-- 藍色直行車 -->
        <img src="CAR2.gif" class="blue-car" alt="藍車直行">
    </div>

</body>
</html>
