<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事件轉場 - 無縫滾動超車版</title>
    <style>
        /* 1. 遊戲視窗容器 */
        .game-viewport {
            width: 1000px;
            height: 400px;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
            border: 6px solid #4c8537;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            
            /* 導入背景，設定水平重複 */
            background-image: url('background.png');
            background-size: auto 100%; /* 高度撐滿，寬度等比例 */
            background-repeat: repeat-x; /* 水平無限重複 */
            
            /* ⚡【核心優化】：轉場時背景不再停滯！持續以常規行車（12s）速度滑順滾動 */
            animation: scrollBackground 2s linear infinite;
            z-index: 1;
        }

        /* 背景往左捲動的關鍵影格 */
        @keyframes scrollBackground {
            from { background-position: 0 0; }
            to { background-position: -1000px 0; }
        }

        .static-sun {
            position: absolute;
            top: -62px;      
            left: 98px;     
            width: 172px;   
            height: auto;
            z-index: 1.5;   
            pointer-events: none;
        }

        /* 2. 紅色主角車定位與時間軸 */
        .player-car {
            position: absolute;
            width: 160px;  
            height: auto;
            bottom: -5px; 
            
            /* 總長 5 秒的流暢加速動畫 */
            animation: redCarRollingEvent 2s linear forwards;
            z-index: 2; 
        }

        /* 3. 藍色後方來車定位與時間軸 */
        .blue-car {
            position: absolute;
            width: 160px;
            height: auto;
            bottom: 15px; 
            
            /* 與紅車完全同步播放 5 秒疾速超車動畫 */
            animation: blueCarRollingEvent 2s linear forwards;
            z-index: 2;
        }

        /* ==========================================
           4. 紅車（主角）無縫滾動前進與加速時間軸
           ========================================== */
        @keyframes redCarRollingEvent {
            /* 0% ~ 40% (0s - 2s)：配合背景滾動，在原地進行上下微幅引擎怠速抖動 */
            0% { left: 200px; transform: translateY(0px); }
            10% { left: 200px; transform: translateY(-4px); }
            20% { left: 200px; transform: translateY(0px); }
            
            
            /* 40% ~ 100% (2s - 5s)：打破滾動平衡，猛踩油門，速度快於背景，全速衝出右側邊界消失 */
            85%,100% {
                left: 1100px; /* 車尾完全離開右側畫框 */
                transform: translateY(0px);
            }
        }

        /* ==========================================
           5. 藍車（事件來車）高速超越並出鏡時間軸
           ========================================== */
        @keyframes blueCarRollingEvent {
            /* 0% (0s)：起點完全隱藏在畫面最左側外 */
            0% {
                left: -200px;
                transform: translateY(0px);
            }
            
            /* 0% ~ 100% (0s - 5s)：以極快行駛速度（大於紅車與背景）一路向前狂飆，完成流暢超車，一同消失在右側 */
            50% {
                transform: translateY(-4px); /* 高速行駛中的路面微幅起伏 */
            }
            100% {
                left: 1100px; /* 超越紅車並完全衝出右側畫框消失 */
                transform: translateY(0px);
            }
        }
    </style>
</head>
<body>

    <div class="game-viewport">
        <!-- 獨立靜態太陽 -->
        <img src="SUN.gif" class="static-sun" alt="太陽">

        <!-- 紅色主角車 -->
        <img src="CAR.gif" class="player-car" alt="紅車主角">

        <!-- 藍色事件車 (CAR2) -->
        <img src="CAR2.gif" class="blue-car" alt="藍車事件">
    </div>

</body>
</html>
