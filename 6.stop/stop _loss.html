<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>緩停事件場景 - 下半段（遊戲失敗修正版）</title>
    <style>
        /* 1. 遊戲視窗容器 */
        .game-viewport {
            width: 1000px;
            height: 400px;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
            border: 6px solid #4c8537;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            
            background-image: url('停止場景.png');
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* 2. 獨立太陽定位 */
        .static-sun {
            position: absolute;
            top: -62px;      
            left: 98px;      
            width: 172px;    
            height: auto;
            z-index: 1.5;   
            pointer-events: none;
        }

        /* 3. 頂層房屋二棟 (維持您的精確比例與右移坐標) */
        .top-house {
            position: absolute;
            width: 110px;       
            height: auto;
            bottom: -10px;      
            z-index: 3;         
            pointer-events: none;
        }
        .house-1 {
            left: 730px;
        }
        .house-2 {
            left: 880px;
        }

        /* 4. 紅色主角車定位與動畫 */
        .player-car {
            position: absolute;
            width: 160px;       
            height: auto;       
            bottom: -5px;       
            
            animation: redCarSlowdownFailure 7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 2; 
        }

        /* 5. 藍色後方來車定位與時間軸 (CAR2) */
        .blue-car {
            position: absolute;
            width: 160px;       
            height: auto;
            bottom: 15px;       
            
            /* ⚡【關鍵修正】：將動畫名稱由原先錯植的 blueCarEnterStage 修正為 blueCarCrashEvent 確保其衝刺前進 */
            animation: blueCarCrashEvent 7s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 2;
        }

        /* 6. 對向迴轉車 CAR3 大小縮小與定位群組 */
        .car3-event-group {
            position: absolute;
            width: 110px;       
            height: auto;
            left: 740px;        
            bottom: 70px;       
            z-index: 1.8;       
            opacity: 0;         
            
            animation: car3ShowUp 7s linear forwards;
        }

        .car3-event-group img {
            position: absolute;
            height: auto;
            bottom: 0;
        }

        .car3-side {
            width: 100%;
            left: -90px;
        }
        .car3-side2 {
            width: 100%;
            left: 30px;
        }
        .car3-back {
            width: 95px;       
            left: 130px;         
        }

        /* 7. 爆炸特效定位 */
        .bomb-effect {
            position: absolute;
            width: 150px;       
            height: 180px;      /* 給予固定高寬 */
            left: 470px;        
            bottom: 35px;       
            
            animation: bombEffectFade 7s ease-out forwards;
            z-index: 3;         
            pointer-events: none;
        }

        /* 8. 「遊戲失敗」標題定位 */
        .failure-banner {
            position: absolute;
            width: 200px;       /* 標題大小 */
            height: auto;
            left: 50%;
            top: -100px;          /* 置中於畫面上半部 */
            transform: translateX(-50%);
            
            /* 標題淡入動畫 */
            animation: bannerFadeIn 7s ease-out forwards;
            z-index: 4;         /* 最頂層 */
            pointer-events: none;
            opacity: 0;         /* 一開始隱形 */
        }

        /* ==========================================
           9. 動態時間軸控制 (Keyframes)
           ========================================== */
        
        /* 紅車時間軸 */
        @keyframes redCarSlowdownFailure {
            0% { left: 205px; transform: translateY(0px); }
            45% { left: 500px; transform: translateY(0px); }
            45.1%{ left: 505px; transform: translate(0px, 0px) rotate(0deg); }
            45.5%{ left: 505px; transform: translate(0px, 0px) rotate(-10deg); }
            46%,100%{ left: 505px; transform: translate(0px, 0px) rotate(0deg); }
        }

        /* ⚡ 藍車（CAR2）衝刺與追撞時間軸 */
        @keyframes blueCarCrashEvent {
            0% { left: 50px; transform: translateY(0px); }
            
            /* 30% 到 55%（第 2.1 秒到 3.85 秒）：從 150px 持續向前狂飆至 300px 進行追撞 */
            45% { left: 400px; transform: translateY(0px); }
            45.1%{ left: 390px; transform: translate(0px, 0px) rotate(0deg); }
            45.5%{ left: 390px; transform: translate(0px, 0px) rotate(-10deg); }
            46%,100%{ left: 390px; transform: translate(0px, 0px) rotate(0deg); }
        }

        /* 堵車群組顯現軸 */
        @keyframes car3ShowUp {
            0%, 29.9% { opacity: 1; }
            30%, 100% { opacity: 1; } 
        }

        @keyframes bombEffectFade {
            /* 0% ~ 59.9%：完全不加載圖片，content 保持為空，瀏覽器在此期間不會下載或啟動 GIF */
            0%, 30% { 
                content: none;
                opacity: 0; 
                transform: scale(0.5); 
            }
            
            /* 60% (撞擊發生瞬間)：這時才把 'BOMB.gif' 放進來，強迫瀏覽器從第 1 影格開始播放 */
            40% {
                content: url('BOMB.gif');
                opacity: 1;
                transform: scale(1.2) translate(-3px, 2px) rotate(-4deg);
            }
            /* 60% ~ 65%：爆炸煙霧震動 */
            51.5% { transform: scale(1.15) translate(3px, -2px) rotate(4deg); }
            53% { transform: scale(1.1) translate(-2px, 1px) rotate(-2deg); }
            54.5% { transform: scale(1.05) translate(1px, -1px) rotate(1deg); }
            
            /* 65% ~ 75%：爆炸播完，慢慢淡出隱形 */
            55% {
                opacity: 1;
                transform: scale(1) translate(0px, 0px) rotate(0deg);
            }
            65% {
                opacity: 0;
                transform: scale(0.8) translate(0, 10px) rotate(0deg);
                content: url('BOMB.gif'); /* 保持圖片載入狀態完成淡出 */
            }
            /* 75.1% ~ 100%：淡出完畢後再次移除圖片，為下一次播放做準備 */
            65.1%, 100% {
                content: none;
                opacity: 0;
            }
        }

        /* ==========================================
           9. 「遊戲失敗」標題淡入時間軸
           ========================================== */
        @keyframes bannerFadeIn {
            /* 0% ~ 70% (特效淡出完成前)：隱形 */
            0%, 50% {
                opacity: 0;
                transform: translate(-50%, -15px) scale(0.8); /* 從稍微上方、縮小淡入 */
            }
            
            /* 75% ~ 100% (場景最終定格)：完全顯現 */
            51% {
                opacity: 0.1;
                transform: translate(-50%, 0) scale(1);
            }
            56% {
                opacity: 0.3;
                transform: translate(-50%, 0) scale(1);
            }
            60% {
                opacity: 0.5;
                transform: translate(-50%, 0) scale(1);
            }
            65% {
                opacity: 0.7;
                transform: translate(-50%, 0) scale(1);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, 0) scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="game-viewport">
        <!-- 「遊戲失敗」標題 (最上層) -->
        <img src="遊戲失敗.png" class="failure-banner" alt="遊戲失敗標題">

        <!-- 獨立靜態太陽 -->
        <img src="sun.gif" class="static-sun" alt="原地太陽">

        <!-- 紅色主角車 -->
        <img src="CAR.gif" class="player-car" alt="紅車主角">

        <!-- 藍色事件車 (後車 CAR2) -->
        <img src="CAR2.gif" class="blue-car" alt="藍車後車">

        <!-- 對向迴轉堵車群組 (CAR3 & CAR4) -->
        <div class="car3-event-group">
            <img src="CAR3.png" class="car3-side" alt="迴轉車側身">
            <img src="CAR4.png" class="car3-side2" alt="迴轉車側身">
            <img src="CAR3_BACK.gif" class="car3-back" alt="迴轉車後視">
        </div>

        <!-- 頂層房屋二棟 -->
        <img src="house.png" class="top-house house-1" alt="前景房屋A">
        <img src="house.png" class="top-house house-2" alt="前景房屋B">

        <!-- 爆炸特效容器 -->
        <div class="bomb-effect"></div>
    </div>

</body>
</html>
